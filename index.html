<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سلمى</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Tajawal',sans-serif;background:#0d001a;min-height:100vh;color:#fff}
#lockPage{min-height:100vh;display:flex;align-items:center;justify-content:center;position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at top,#1a0533 0%,#0d001a 60%,#1a0533 100%);overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;pointer-events:none}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:1}}
.hfloat{position:absolute;bottom:-30px;font-size:18px;pointer-events:none}
@keyframes floatUp{0%{transform:translateY(0);opacity:0}10%{opacity:1}100%{transform:translateY(-110vh);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px #ff6b9d,0 0 40px #c44dff}50%{text-shadow:0 0 40px #ff6b9d,0 0 80px #c44dff}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
@keyframes bGlow{0%,100%{box-shadow:0 0 15px #c44dff,0 0 30px #ff6b9d}50%{box-shadow:0 0 35px #c44dff,0 0 65px #ff6b9d}}
.lbox{background:linear-gradient(135deg,rgba(196,77,255,.18),rgba(255,107,157,.13));border:1px solid rgba(196,77,255,.4);border-radius:32px;padding:50px 36px;max-width:400px;width:88%;text-align:center;animation:fadeUp .9s ease-out;box-shadow:0 0 60px rgba(196,77,255,.25);position:relative;z-index:1}
.ltitle{font-size:1.9em;font-weight:900;margin-bottom:8px;animation:glow 2.5s infinite;color:#fff}
.lsub{color:rgba(255,255,255,.55);font-size:.95em;margin-bottom:28px}
.iwrap{position:relative;margin-bottom:14px}
.pinput{width:100%;padding:16px 50px 16px 18px;background:rgba(255,255,255,.07);border:1px solid rgba(196,77,255,.45);border-radius:16px;color:#fff;font-size:1.3em;font-family:'Tajawal',sans-serif;outline:none;text-align:center;letter-spacing:3px;transition:all .3s}
.pinput:focus{border-color:#c44dff;box-shadow:0 0 18px rgba(196,77,255,.35)}
.pinput::placeholder{color:rgba(255,255,255,.3);font-size:.72em;letter-spacing:1px}
.eyebtn{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.45);font-size:1.2em;cursor:pointer}
.gobtn{width:100%;padding:16px;font-size:1.35em;font-weight:900;background:linear-gradient(135deg,#c44dff,#ff6b9d);color:#fff;border:none;border-radius:16px;cursor:pointer;font-family:'Tajawal',sans-serif;animation:bGlow 2s infinite;transition:all .3s;margin-top:4px}
.errtxt{color:#ff6b9d;font-size:.95em;margin-top:12px;min-height:22px;font-weight:700}
.errtxt.shake{animation:shake .4s ease-out}
.hinttxt{color:rgba(255,255,255,.28);font-size:.82em;margin-top:14px}
#sitePage{display:none}
</style>
</head>
<body>

<div id="lockPage">
  <div id="bgDiv"></div>
  <div class="lbox">
    <div style="font-size:75px;margin-bottom:16px">&#128274;</div>
    <div class="ltitle">&#1605;&#1608;&#1602;&#1593; &#1582;&#1575;&#1589; &#1604;&#1587;&#1604;&#1605;&#1609; &#128156;</div>
    <p class="lsub">&#1575;&#1583;&#1582;&#1604;&#1610; &#1575;&#1604;&#1576;&#1575;&#1587;&#1608;&#1585;&#1583; &#1593;&#1588;&#1575;&#1606; &#1578;&#1601;&#1578;&#1581;&#1610; &#1575;&#1604;&#1605;&#1601;&#1575;&#1580;&#1623;&#1577;!</p>
    <div class="iwrap">
      <input class="pinput" type="password" id="pi" placeholder="&#1575;&#1604;&#1576;&#1575;&#1587;&#1608;&#1585;&#1583; &#1607;&#1606;&#1575;..." onkeydown="if(event.key==='Enter')go()">
      <button class="eyebtn" type="button" onclick="eye()">&#128065;</button>
    </div>
    <button class="gobtn" onclick="go()">&#127873; &#1575;&#1583;&#1582;&#1604;&#1610;!</button>
    <div class="errtxt" id="et"></div>
    <p class="hinttxt">&#128161; &#1575;&#1604;&#1576;&#1575;&#1587;&#1608;&#1585;&#1583; &#1605;&#1606; &#1571;&#1582;&#1608;&#1603;&#1616; &#1591;&#1575;&#1607;&#1585; &#128525;</p>
  </div>
</div>

<div id="sitePage"></div>

<script>
var SITE_HTML = "<style>\n        * { margin:0; padding:0; box-sizing:border-box; }\n        body {\n            font-family:'Tajawal',sans-serif;\n            background: radial-gradient(ellipse at top, #1a0533 0%, #0d001a 60%, #1a0533 100%);\n            min-height:100vh; overflow-x:hidden; color:white;\n        }\n        /* \u0646\u062c\u0648\u0645 */\n        .stars { position:fixed; width:100%; height:100%; top:0; left:0; pointer-events:none; z-index:0; }\n        .star { position:absolute; border-radius:50%; background:white; animation:twinkle 3s infinite ease-in-out; }\n        @keyframes twinkle { 0%,100%{opacity:.1;transform:scale(.8)} 50%{opacity:1;transform:scale(1.3)} }\n        /* \u0642\u0644\u0648\u0628 \u0637\u0627\u064a\u0631\u0629 */\n        .heart-float { position:fixed; bottom:-30px; font-size:22px; animation:floatUp 9s infinite ease-in; pointer-events:none; z-index:1; }\n        @keyframes floatUp { 0%{transform:translateY(0) scale(.8);opacity:0} 10%{opacity:1} 90%{opacity:.5} 100%{transform:translateY(-105vh) scale(1.2);opacity:0} }\n        /* \u0643\u0648\u0646\u0641\u064a\u062a\u064a */\n        .confetti-piece { position:fixed; border-radius:50%; pointer-events:none; z-index:9999; animation:fall linear forwards; }\n        @keyframes fall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(900deg);opacity:0} }\n        /* \u0623\u0646\u064a\u0645\u064a\u0634\u0646 \u0639\u0627\u0645 */\n        @keyframes fadeUp { from{opacity:0;transform:translateY(35px)} to{opacity:1;transform:translateY(0)} }\n        @keyframes shimmer { 0%{background-position:200% center} 100%{background-position:-200% center} }\n        @keyframes glow { 0%,100%{text-shadow:0 0 20px #ff6b9d,0 0 40px #c44dff} 50%{text-shadow:0 0 40px #ff6b9d,0 0 80px #c44dff,0 0 120px #ff9de2} }\n        @keyframes spin { from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(360deg)} }\n        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-22px)} }\n        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }\n        @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }\n        @keyframes borderGlow { 0%,100%{box-shadow:0 0 15px #c44dff,0 0 30px #ff6b9d} 50%{box-shadow:0 0 30px #c44dff,0 0 60px #ff6b9d,0 0 100px #ff9de2} }\n        @keyframes msgReveal { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }\n\n        /* \u0628\u0637\u0627\u0642\u0629 */\n        .card {\n            background: linear-gradient(135deg,rgba(196,77,255,0.12),rgba(255,107,157,0.1));\n            border: 1px solid rgba(196,77,255,0.28);\n            border-radius: 32px; padding: 40px 30px; margin-bottom: 28px;\n            box-shadow: 0 8px 32px rgba(196,77,255,0.12);\n        }\n\n        /* hero */\n        .hero { text-align:center; padding:65px 30px 55px; animation:fadeUp 1s ease-out; }\n        .cake-wrap { position:relative; display:inline-block; margin-bottom:22px; }\n        .ring {\n            width:130px; height:130px; border-radius:50%;\n            border:3px solid transparent;\n            background-image: linear-gradient(#0d001a,#0d001a), linear-gradient(135deg,#c44dff,#ff6b9d,#ffe66d);\n            background-origin:border-box; background-clip:padding-box,border-box;\n            position:absolute; top:50%; left:50%;\n            animation:spin 4s linear infinite;\n        }\n        .cake-emoji { font-size:85px; line-height:1; position:relative; z-index:1; animation:bounce 2s infinite; }\n        h1 {\n            font-size:3.2em; font-weight:900; margin:18px 0 10px;\n            background:linear-gradient(135deg,#ff9de2,#c44dff,#ffe66d,#ff6b9d);\n            background-size:300% auto;\n            -webkit-background-clip:text; -webkit-text-fill-color:transparent;\n            animation:shimmer 3s linear infinite;\n        }\n        h2.name { font-size:2.6em; font-weight:900; margin:0 0 18px; animation:glow 2.5s infinite; }\n        .age-badge {\n            display:inline-block; background:linear-gradient(135deg,#ff6b6b,#ee5a24);\n            color:white; padding:14px 40px; border-radius:50px;\n            font-size:1.7em; font-weight:900; margin:18px 0 24px;\n            box-shadow:0 12px 30px rgba(255,107,107,0.4);\n        }\n        .hero-sub { color:rgba(255,255,255,0.75); font-size:1.2em; margin-bottom:28px; }\n\n        /* music */\n        .music-box {\n            background:rgba(255,255,255,0.08); backdrop-filter:blur(12px);\n            border:1px solid rgba(255,255,255,0.2); border-radius:24px;\n            padding:22px 28px; max-width:450px; margin:0 auto 28px;\n        }\n        .music-label { font-size:1.2em; font-weight:700; color:#ff9de2; margin-bottom:14px; }\n        .music-row { display:flex; align-items:center; justify-content:center; gap:18px; }\n        .play-btn {\n            background:linear-gradient(135deg,#c44dff,#ff6b9d); border:none;\n            width:58px; height:58px; border-radius:50%; color:white; font-size:22px;\n            cursor:pointer; box-shadow:0 8px 20px rgba(196,77,255,0.45);\n            transition:all .3s; display:flex; align-items:center; justify-content:center;\n        }\n        .play-btn:hover { transform:scale(1.12); }\n        input[type=range] {\n            width:140px; height:7px; -webkit-appearance:none;\n            background:rgba(255,255,255,0.25); border-radius:10px; outline:none;\n        }\n        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:white; cursor:pointer; }\n        .music-hint { color:rgba(255,255,255,0.55); font-size:0.88em; margin-top:10px; }\n\n        /* surprise btn */\n        .surprise-btn {\n            background:linear-gradient(135deg,#c44dff,#ff6b9d); color:white; border:none;\n            padding:20px 55px; font-size:1.5em; font-weight:900; border-radius:60px;\n            cursor:pointer; font-family:inherit; transition:all .3s;\n            animation:borderGlow 2s infinite;\n        }\n        .surprise-btn:hover { transform:translateY(-4px) scale(1.05); filter:brightness(1.1); }\n\n        /* countdown */\n        .countdown-title { color:#ff9de2; font-size:1.6em; font-weight:700; margin-bottom:28px; text-align:center; }\n        .countdown { display:flex; justify-content:center; gap:16px; flex-wrap:wrap; }\n        .cd-box {\n            background:linear-gradient(135deg,rgba(196,77,255,0.2),rgba(255,107,157,0.15));\n            border:1px solid rgba(196,77,255,0.4); border-radius:22px;\n            padding:22px 16px; min-width:88px; text-align:center;\n            box-shadow:0 8px 20px rgba(196,77,255,0.2); transition:all .3s;\n        }\n        .cd-box:hover { transform:translateY(-6px) scale(1.05); }\n        .cd-num { font-size:2.8em; font-weight:900; color:#ff9de2; line-height:1; }\n        .cd-label { font-size:.9em; color:rgba(255,255,255,0.6); margin-top:6px; }\n\n        /* gallery */\n        .section-title { color:#ff9de2; font-size:1.8em; font-weight:900; text-align:center; margin-bottom:28px; }\n        .gallery-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }\n        .photo-wrap {\n            border-radius:22px; overflow:hidden; aspect-ratio:3/4;\n            border:2px solid rgba(196,77,255,0.4);\n            box-shadow:0 8px 24px rgba(196,77,255,0.25);\n            cursor:pointer; transition:all .35s; position:relative;\n        }\n        .photo-wrap:hover { transform:scale(1.05) rotate(-1deg); box-shadow:0 16px 40px rgba(196,77,255,0.45); }\n        .photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s; }\n        .photo-wrap:hover img { transform:scale(1.1); }\n        .photo-cap { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(13,0,26,.85)); color:white; padding:20px 12px 12px; font-size:.9em; font-weight:700; text-align:center; }\n\n        /* messages */\n        .msg-card {\n            background:linear-gradient(135deg,rgba(196,77,255,0.18),rgba(255,107,157,0.14));\n            border:1px solid rgba(196,77,255,0.3); border-radius:22px;\n            padding:24px 28px; margin-bottom:16px;\n            font-size:1.15em; line-height:1.9;\n            display:flex; gap:14px; align-items:flex-start;\n            border-right:5px solid #c44dff;\n            opacity:0; animation:msgReveal .6s ease-out forwards;\n        }\n        .msg-card:nth-child(1){animation-delay:.5s}\n        .msg-card:nth-child(2){animation-delay:1s}\n        .msg-card:nth-child(3){animation-delay:1.5s}\n        .msg-icon { font-size:1.7em; flex-shrink:0; }\n        .msg-text { color:rgba(255,255,255,0.9); }\n        .msg-text strong { color:#ff9de2; }\n\n        /* footer */\n        .footer { text-align:center; padding:30px 20px 50px; color:rgba(255,255,255,0.55); font-size:1em; }\n        .footer-heart { font-size:2em; animation:heartbeat 1.5s infinite; display:inline-block; }\n        .footer-name { color:#ff9de2; font-size:1.3em; font-weight:900; }\n\n        /* lightbox */\n        .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:2000; align-items:center; justify-content:center; padding:20px; }\n        .lightbox.open { display:flex; }\n        .lightbox img { max-width:500px; width:100%; border-radius:24px; border:2px solid rgba(196,77,255,0.5); box-shadow:0 0 60px rgba(196,77,255,0.4); }\n        .lightbox-cap { color:#ff9de2; font-size:1.1em; margin-top:14px; text-align:center; }\n        .lightbox-hint { color:rgba(255,255,255,0.35); font-size:.85em; margin-top:6px; text-align:center; }\n\n        /* modal */\n        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:3000; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(8px); }\n        .modal.open { displ ById('stars');\nfor(let i=0;i<35;i++){\n    const s=document.createElement('div');\n    s.className='star';\n    const sz=Math.random()*3+1;\n    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*2+2}s`;\n    starsEl.appendChild(s);\n}\n\n// \u0642\u0644\u0648\u0628 \u0637\u0627\u064a\u0631\u0629\nconst heartsEl=document.getElementById('hearts');\nfor(let i=0;i<9;i++){\n    const h=document.createElement('div');\n    h.className='heart-float';\n    h.textContent='\ud83d\udc97';\n    h.style.cssText=`left:${i*11+3}%;animation-delay:${i*1.1}s;animation-duration:${7+Math.random()*4}s`;\n    heartsEl.appendChild(h);\n}\n\n// \u0639\u062f \u062a\u0646\u0627\u0632\u0644\u064a\nfunction tick(){\n    const now=new Date();\n    let bd=new Date(now.getFullYear(),5,28);\n    if(now>bd) bd=new Date(now.getFullYear()+1,5,28);\n    const d=bd-now;\n    document.getElementById('days').textContent=String(Math.floor(d/86400000)).padStart(2,'0');\n    document.getElementById('hours').textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');\n    document.getElementById('mins').textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');\n    document.getElementById('secs').textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');\n}\nsetInterval(tick,1000); tick();\n\n// \u0643\u0648\u0646\u0641\u064a\u062a\u064a\nfunction boom(){\n    const cols=['#ff6b9d','#c44dff','#ff9de2','#ffe66d','#a29bfe','#fd79a8','#00cec9'];\n    const emj=['\ud83d\udc96','\u2b50','\u2728','\ud83c\udf38','\ud83d\udc9c','\ud83c\udf80','\ud83d\udcab'];\n    for(let i=0;i<120;i++){\n        const c=document.createElement('div');\n        c.className='confetti-piece';\n        const isEmj=Math.random()>.5;\n        const sz=Math.random()*14+6;\n        c.style.cssText=`left:${Math.random()*100}%;top:-5%;width:${isEmj?'auto':sz+'px'};height:${isEmj?'auto':sz+'px'};background:${isEmj?'transparent':cols[i%cols.length]};font-size:${isEmj?sz+4+'px':'0'};animation-duration:${Math.random()*2.5+2}s;animation-delay:${Math.random()*.8}s`;\n        c.textContent=isEmj?emj[i%emj.length]:'';\n        document.body.appendChild(c);\n        setTimeout(()=>c.remove(),(Math.random()*2.5+2+Math.random()*.8+.5)*1000);\n    }\n}\nsetTimeout(boom,1200);\n\n// lightbox\nfunction openLight(i){\n    document.getElementById('lbImg').src=IMGS[i];\n    document.getElementById('lbCap').textContent=CAPS[i];\n    document.getElementById('lightbox').classList.add('open');\n}\nfunction closeLight(){ document.getElementById('lightbox').classList.remove('open'); }\n\n// modal\nfunction openModal(){ document.getElementById('modal').classList.add('open'); boom(); }\nfunction closeModal(){ document.getElementById('modal').classList.remove('open'); }\ndocument.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});\n\n// music\nlet playing=false;\nconst song=document.getElementById('song');\nsong.volume=.5;\nfunction toggleMusic(){\n    if(playing){song.pause();document.getElementById('playBtn').textContent='\u25b6\ufe0f';playing=false;}\n    else{song.play().catch(()=>{});document.getElementById('playBtn').textContent='\u23f8\ufe0f';playing=true;}\n}\nfunction changeVol(v){song.volume=v/100;}\n\n// sparkle\ndocument.addEventListener('mousemove',function(e){\n    if(Math.random()>.97){\n        const s=document.createElement('div');\n        s.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;width:5px;height:5px;background:white;border-radius:50%;pointer-events:none;z-index:9998;animation:twinkle 1.5s forwards`;\n        document.body.appendChild(s);\n        setTimeout(()=>s.remove(),1500);\n    }\n});\n";
var CORRECT = "salma2009";

var bd = document.getElementById('bgDiv');
bd.style.cssText = 'position:absolute;inset:0;overflow:hidden;';
for(var i=0;i<30;i++){
  var s=document.createElement('div'); s.className='star';
  var sz=Math.random()*3+1;
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;animation:twinkle '+(Math.random()*2+2)+'s '+(Math.random()*3)+'s infinite ease-in-out;';
  bd.appendChild(s);
}
for(var i=0;i<7;i++){
  var h=document.createElement('div'); h.className='hfloat';
  h.innerHTML='&#128151;';
  h.style.cssText='left:'+(i*14+4)+'%;animation:floatUp '+(7+Math.random()*4)+'s '+(i*1.1)+'s infinite ease-in;';
  bd.appendChild(h);
}

function eye(){
  var p=document.getElementById('pi');
  p.type = p.type==='password' ? 'text' : 'password';
}

function go(){
  var v=document.getElementById('pi').value.trim();
  var et=document.getElementById('et');
  if(v===CORRECT){
    document.getElementById('lockPage').remove();
    var sp=document.getElementById('sitePage');
    sp.innerHTML = SITE_HTML;
    sp.style.display='block';
    var sc = document.createElement('script');
    sc.textContent = SITE_SCRIPTS;
    document.body.appendChild(sc);
  } else {
    et.textContent='\u062E\u0637\u0623! \u062C\u0631\u0628\u064A \u062A\u0627\u0646\u064A';
    et.classList.remove('shake');
    void et.offsetWidth;
    et.classList.add('shake');
    document.getElementById('pi').value='';
  }
}
